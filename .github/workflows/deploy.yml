name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version Tag (z.B. v1.0.0)'
        required: true
        type: string

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download JAR from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p './release_jar'
          gh release download ${{ inputs.tag }} --pattern "*.jar" --dir ./release_jar

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload JAR to VPS
        run: |
          JAR_FILE=$(ls ./release_jar/Auftragsmanager-*.jar | head -1)
          scp -i ~/.ssh/deploy_key "$JAR_FILE" root@${{ secrets.VPS_IP }}:/root/AuftragsManager/Auftragsmanager.jar

      - name: Run start.sh on VPS
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_IP }} "/root/AuftragsManager/start.sh"
